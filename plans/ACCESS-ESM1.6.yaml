# Submission plan for ACCESS-ESM1.6
# Defines which experiments and ensemble members are planned for CMORisation
# and ESGF submission.
# Conforms to schemas/plan.schema.json

model: ACCESS-ESM1.6
esgf_node: esgf.nci.org.au
mip_era: CMIP7
notes: >
  ACCESS-ESM1.6 CMIP7 submission. Target data node is NCI ESGF.
  Mapping source: src/access_moppy/mappings/ACCESS-ESM1.6_mappings.json.
  Variable names below are CMIP7 physical parameter IDs. Full compound names
  (e.g. atmos.tas.tavg-h2m-hxy-u.mon.GLB) are specified in individual request YAMLs.
  Note: ssp585 and ssp245 are pending formal registration in the CMIP7 CV.

